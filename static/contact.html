<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#030303" />
    <meta name="description" content="Tell England Systems what you need to fix, build, automate, or clean up in your small business." />
    <title>Start a Project | England Systems</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <canvas id="edge-particles" aria-hidden="true"></canvas>

    <header class="site-header" aria-label="Primary">
      <a class="brand" href="/" aria-label="England Systems home">
        <span class="brand-mark">
          <img src="/static/logo.webp" alt="" />
        </span>
        <span class="brand-name">England Systems</span>
      </a>
      <nav class="site-nav" id="primary-navigation" aria-label="Page sections">
        <a href="/#services">Services</a>
        <a href="/#examples">Examples</a>
        <a href="/#about">About</a>
        <a class="nav-cta" href="/#contact">Start a Project</a>
      </nav>
    </header>

    <main class="contact-page">
      <section class="contact-layout" aria-labelledby="contact-title">
        <form class="contact-form" action="/contact" method="post" data-contact-form>
          <div class="form-heading">
            <p class="eyebrow">Start a project</p>
            <h1 id="contact-title">Tell me what you need.</h1>
            <p>Describe what you are trying to fix, build, automate, or clean up. You do not need a technical specification.</p>
          </div>
          <p class="form-success" data-contact-success hidden>Message received. I will follow up soon.</p>
          <label>
            <span>Name</span>
            <input name="name" type="text" autocomplete="name" maxlength="120" required />
          </label>

          <label>
            <span>Email</span>
            <input name="email" type="email" autocomplete="email" maxlength="254" required />
          </label>

          <label>
            <span>Phone <small>(optional)</small></span>
            <input name="phone" type="tel" autocomplete="tel" inputmode="tel" maxlength="40" pattern="[+]?[0-9 ().-]*[0-9][0-9 ().-]*" title="Enter a phone number using 7 to 15 digits." />
          </label>

          <label>
            <span>What do you need help with?</span>
            <textarea name="message" rows="6" maxlength="1000" placeholder="Tell me what is not working well today and what you would like to improve." data-character-counter required></textarea>
            <small class="character-count" data-character-count>1000 characters left</small>
          </label>

          <button class="button primary" type="submit">Tell Me What You Need</button>
        </form>
      </section>
    </main>

    <script src="/static/particles.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
